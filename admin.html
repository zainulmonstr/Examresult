<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Board Exams</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #2c3e50; color: white; margin: 0; padding: 20px; }
        h1 { text-align: center; margin-bottom: 30px; }
        .panel { background: #34495e; padding: 25px; border-radius: 8px; max-width: 500px; margin: 0 auto 20px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .panel h2 { margin-top: 0; border-bottom: 1px solid #7f8c8d; padding-bottom: 10px; color: #f1c40f; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; }
        input { width: 100%; padding: 10px; border: none; border-radius: 4px; box-sizing: border-box; background: #ecf0f1; }
        .row { display: flex; gap: 10px; }
        button { background-color: #27ae60; color: white; padding: 12px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #2ecc71; }
        .success { background: #2ecc71; padding: 10px; border-radius: 4px; text-align: center; display: none; margin-top: 15px; font-weight: bold;}
    </style>
</head>
<body>

    <h1>Admin Control Panel</h1>

    <!-- Timer Control -->
    <div class="panel">
        <h2>1. Set Result Date & Time</h2>
        <div class="input-group">
            <label>Select Date and Time for Result Release:</label>
            <input type="datetime-local" id="timerInput">
        </div>
        <button onclick="setTimer()">Start/Update Timer</button>
        <div id="timer-success" class="success">Timer Updated Successfully!</div>
    </div>

    <!-- Add Student Data -->
    <div class="panel">
        <h2>2. Add Student Data</h2>
        <div class="input-group">
            <label>Seat Number (Must be Unique)</label>
            <input type="text" id="addSeat" placeholder="e.g. S1001">
        </div>
        <div class="input-group">
            <label>Student Full Name</label>
            <input type="text" id="addName" placeholder="e.g. Zainul">
        </div>
        <div class="row">
            <div class="input-group" style="flex: 1;">
                <label>Math Marks</label>
                <input type="number" id="addMath" placeholder="Out of 100">
            </div>
            <div class="input-group" style="flex: 1;">
                <label>Science</label>
                <input type="number" id="addSci" placeholder="Out of 100">
            </div>
            <div class="input-group" style="flex: 1;">
                <label>English</label>
                <input type="number" id="addEng" placeholder="Out of 100">
            </div>
        </div>
        <button onclick="addStudent()">Save Student Data</button>
        <div id="student-success" class="success">Student Added Successfully!</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPVUhbEGxIZz_HxwG6DGJa2pSgfyB-1WU",
            authDomain: "zainul-board-exam.firebaseapp.com",
            databaseURL: "https://zainul-board-exam-default-rtdb.firebaseio.com",
            projectId: "zainul-board-exam",
            storageBucket: "zainul-board-exam.firebasestorage.app",
            messagingSenderId: "821744610892",
            appId: "1:821744610892:web:614c54c8225b5fb8a24ee9",
            measurementId: "G-H0TJEFV1FB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Function to Set Timer
        window.setTimer = function() {
            const timeVal = document.getElementById('timerInput').value;
            if(!timeVal) { alert("Please select a date and time!"); return; }

            set(ref(db, 'settings/result_time'), timeVal)
            .then(() => {
                const msg = document.getElementById('timer-success');
                msg.style.display = 'block';
                setTimeout(() => msg.style.display = 'none', 3000);
            })
            .catch((error) => { alert("Error setting timer: " + error); });
        };

        // Function to Add Student
        window.addStudent = function() {
            const seat = document.getElementById('addSeat').value.trim();
            const name = document.getElementById('addName').value.trim();
            const math = document.getElementById('addMath').value;
            const sci = document.getElementById('addSci').value;
            const eng = document.getElementById('addEng').value;

            if(!seat || !name || !math || !sci || !eng) {
                alert("Please fill all fields!");
                return;
            }

            set(ref(db, 'students/' + seat), {
                name: name,
                math: math,
                science: sci,
                english: eng
            })
            .then(() => {
                const msg = document.getElementById('student-success');
                msg.style.display = 'block';
                setTimeout(() => msg.style.display = 'none', 3000);
                
                // Clear inputs
                document.getElementById('addSeat').value = '';
                document.getElementById('addName').value = '';
                document.getElementById('addMath').value = '';
                document.getElementById('addSci').value = '';
                document.getElementById('addEng').value = '';
            })
            .catch((error) => { alert("Error saving student: " + error); });
        };
    </script>
</body>
</html>
